{% if form.errors %}
  <div class="form-summary-error" role="alert">
    <strong>Перевірте форму</strong>
    <ul class="form-error-list">
      {% for error in form.non_field_errors %}
        <li>{{ error }}</li>
      {% endfor %}
      {% for field in form %}
        {% for error in field.errors %}
          <li><b>{{ field.label }}:</b> {{ error }}</li>
        {% endfor %}
      {% endfor %}
    </ul>
  </div>
{% endif %}

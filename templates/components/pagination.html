{% if page_obj and page_obj.paginator.num_pages > 1 %}
  <nav class="pagination" aria-label="Пагінація">
    {% if page_obj.has_previous %}
      <a class="btn btn-ghost" href="?{% if page_query %}{{ page_query }}&{% endif %}page={{ page_obj.previous_page_number }}">Назад</a>
    {% endif %}
    <span>Сторінка {{ page_obj.number }} з {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a class="btn btn-ghost" href="?{% if page_query %}{{ page_query }}&{% endif %}page={{ page_obj.next_page_number }}">Далі</a>
    {% endif %}
  </nav>
{% endif %}
